<!DOCTYPE html>
<html lang="vi" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tạo đề trắc nghiệm - Hóa học ABC</title>
    <script>
        window.tailwind = { 
            config: { 
                theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } } 
            } 
        }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/mobile-drag-drop@2.3.0-rc.2/default.css">
    <script src="https://cdn.jsdelivr.net/npm/mobile-drag-drop@2.3.0-rc.2/index.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mobile-drag-drop@2.3.0-rc.2/scroll-behaviour.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <style type="text/tailwindcss">
        @layer components {
            .btn { @apply relative px-4 py-2 sm:px-5 sm:py-2.5 rounded-xl font-bold inline-flex items-center justify-center transition-all duration-200 text-xs sm:text-sm focus:outline-none active:translate-y-1; }
            .btn-primary { @apply bg-blue-500 text-white shadow-[0_4px_0_0_#1d4ed8] hover:shadow-[0_6px_0_0_#1d4ed8] hover:-translate-y-0.5 hover:bg-blue-400 active:shadow-[0_0px_0_0_#1d4ed8]; }
            .btn-green { @apply bg-emerald-500 text-white shadow-[0_4px_0_0_#047857] hover:shadow-[0_6px_0_0_#047857] hover:-translate-y-0.5 hover:bg-emerald-400 active:shadow-[0_0px_0_0_#047857]; }
            .btn-outline { @apply bg-white border-2 border-slate-200 text-slate-700 shadow-[0_4px_0_0_#e2e8f0] hover:border-slate-300 hover:shadow-[0_6px_0_0_#cbd5e1] hover:-translate-y-0.5 hover:text-slate-900 active:shadow-[0_0px_0_0_#e2e8f0]; }
            .tab-btn { @apply w-full flex flex-col items-center justify-center px-1 sm:px-2 py-1.5 sm:py-2 text-xs sm:text-base font-extrabold rounded-xl transition-all duration-200 border-2 active:translate-y-1; }
            .tab-active { @apply bg-blue-50 text-blue-700 border-blue-400 shadow-[0_4px_0_0_#60a5fa] -translate-y-1 scale-105; }
            .tab-inactive { @apply bg-slate-50 text-slate-500 border-transparent hover:bg-white hover:border-slate-200 hover:shadow-[0_4px_0_0_#e2e8f0] hover:-translate-y-1 hover:text-slate-700 active:shadow-[0_0px_0_0_#e2e8f0]; }
            .form-label { @apply block text-[10px] sm:text-xs font-bold text-slate-600 uppercase tracking-wide mb-1; }
            .form-input, .form-select { @apply w-full bg-slate-50 border-2 border-slate-200 text-slate-900 rounded-xl px-3 py-2 sm:px-4 sm:py-2 text-xs sm:text-sm outline-none transition-all duration-200 hover:border-blue-400 focus:bg-white focus:border-blue-500 focus:ring-4 focus:ring-blue-500/20 shadow-inner; }
        }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 font-sans min-h-screen flex flex-col">
    <header class="bg-white border-b border-slate-200 shadow-sm sticky top-0 z-40">
        <div class="max-w-[1500px] mx-auto px-3 sm:px-4 lg:px-6 min-h-[64px] py-2 flex flex-wrap items-center justify-between gap-3">
            <div class="flex items-center gap-2 sm:gap-3 shrink-0">
                <div class="bg-blue-500 p-2 sm:p-2.5 rounded-xl text-white shadow-[0_3px_0_0_#1d4ed8] shrink-0"><i data-lucide="flask-conical" class="w-4 h-4 sm:w-5 sm:h-5"></i></div>
                <h1 class="text-base sm:text-xl font-bold text-slate-900 tracking-tight line-clamp-1">Tạo đề Hóa học ABC</h1>
            </div>
            <div class="flex items-center flex-wrap gap-1.5 sm:gap-2 justify-start sm:justify-end flex-1">
                <button class="btn btn-outline" onclick="app.newProject()"><i data-lucide="file-plus" class="w-4 h-4 sm:mr-2"></i><span class="hidden sm:inline">Tạo mới</span></button>
                <button class="btn btn-outline" onclick="app.loadProject()"><i data-lucide="folder-open" class="w-4 h-4 sm:mr-2"></i><span class="hidden sm:inline">Mở file</span></button>
                <button class="btn btn-outline" onclick="app.saveProject()"><i data-lucide="save" class="w-4 h-4 sm:mr-2"></i><span class="hidden sm:inline">Lưu lại</span></button>
                <button class="btn btn-outline" onclick="document.getElementById('txtLoader').click()"><i data-lucide="upload" class="w-4 h-4 sm:mr-2"></i><span class="hidden sm:inline">Nhập TXT</span></button>
                <div class="w-full sm:w-px h-px sm:h-8 bg-slate-200 mx-0.5 sm:mx-1 shrink-0 hidden sm:block"></div>
                <button class="btn btn-green" onclick="app.openGFSettings()"><i data-lucide="database" class="w-4 h-4 sm:mr-2"></i><span class="hidden sm:inline">Google Form</span><span class="sm:hidden">Form</span></button>
                <button class="btn btn-outline" onclick="app.exportWord()"><i data-lucide="file-text" class="w-4 h-4 sm:mr-2"></i><span class="hidden sm:inline">Xuất Word</span></button>
                <button class="btn btn-outline" onclick="app.exportPDF()"><i data-lucide="printer" class="w-4 h-4 sm:mr-2"></i><span class="hidden sm:inline">Xuất PDF</span></button>
                <button class="btn btn-primary" onclick="app.exportHTML()"><i data-lucide="rocket" class="w-4 h-4 sm:mr-2"></i><span>Xuất HTML</span></button>
            </div>
        </div>
    </header>

    <main class="flex-1 max-w-[1500px] mx-auto w-full px-2 sm:px-4 lg:px-6 py-2 sm:py-3 flex flex-col gap-3">
        <section class="bg-white p-3 lg:p-4 rounded-xl shadow-sm border border-slate-200 shrink-0">
            <h2 class="form-label mb-2 flex items-center gap-2 text-sm"><i data-lucide="settings-2" class="w-4 h-4 text-blue-600"></i> Cấu hình đề thi</h2>
            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-3 lg:gap-4">
                <div class="flex flex-col gap-2">
                    <div>
                        <label class="form-label">Tên bài kiểm tra</label>
                        <input type="text" id="quizTitle" class="form-input" value="BÀI TẬP TRẮC NGHIỆM">
                    </div>
                    <div>
                        <label class="form-label">Người tạo</label>
                        <input type="text" id="creatorName" class="form-input" placeholder="VD: Thầy A">
                    </div>
                </div>
                <div class="flex flex-col gap-2">
                    <div>
                        <label class="form-label">Giờ bắt đầu</label>
                        <input type="text" id="startTime" class="form-input" placeholder="VD: 08:00 20/11/2026">
                    </div>
                    <div>
                        <label class="form-label">Giờ kết thúc</label>
                        <input type="text" id="endTime" class="form-input" placeholder="VD: 09:00 20/11/2026">
                    </div>
                </div>
                <div class="flex flex-col gap-2">
                    <div>
                        <label class="form-label">Giao diện (Theme)</label>
                        <select id="themeSelect" class="form-select"></select>
                    </div>
                    <div class="flex flex-col gap-1.5 mt-1">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" id="antiCheat" class="w-4 h-4 text-blue-600 rounded focus:ring-blue-500 cursor-pointer">
                            <span class="text-xs sm:text-sm font-semibold text-slate-700">Chống gian lận (Khóa chuyển tab)</span>
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" id="publishScore" class="w-4 h-4 text-blue-600 rounded focus:ring-blue-500 cursor-pointer">
                            <span class="text-xs sm:text-sm font-semibold text-slate-700">Công bố điểm sau nộp</span>
                        </label>
                    </div>
                </div>
            </div>
        </section>

        <section class="grid grid-cols-1 lg:grid-cols-12 gap-3 sm:gap-4 flex-1 items-start">
            
            <div class="lg:col-span-8 bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col overflow-hidden h-auto lg:h-[calc(100vh-14rem)] lg:sticky lg:top-20">
                <div class="bg-slate-100 p-1.5 sm:p-2 border-b border-slate-200 grid grid-cols-3 sm:grid-cols-6 gap-1 sm:gap-2 shrink-0" id="tabsContainer"></div>
                <div class="p-2 sm:p-4 flex-1 flex flex-col bg-slate-50 min-h-[400px] lg:min-h-0">
                    <div class="flex justify-between items-center mb-2 shrink-0">
                        <h2 class="text-base sm:text-lg font-extrabold text-blue-700 flex items-center gap-2" id="partTitle">Dạng 1</h2>
                        <button class="btn btn-outline py-1 px-2 sm:px-3 text-[10px] sm:text-xs" onclick="app.showGuide()"><i data-lucide="help-circle" class="w-3.5 h-3.5 sm:w-4 sm:h-4 mr-1 sm:mr-1.5 text-blue-600"></i> HD nhập</button>
                    </div>
                    
                    <div class="flex-1 flex flex-col min-h-0 bg-white border-2 border-slate-200 rounded-xl sm:rounded-2xl overflow-hidden focus-within:border-blue-400 focus-within:ring-4 focus-within:ring-blue-500/20 transition-all shadow-sm">
                        <div class="bg-slate-100 p-1.5 sm:p-2 border-b-2 border-slate-200 shrink-0" id="editorToolbar"></div>
                        <textarea id="qInput" class="w-full p-3 sm:p-4 font-mono text-sm sm:text-base flex-1 min-h-[200px] outline-none resize-none bg-transparent placeholder-slate-400 leading-relaxed overflow-y-auto" placeholder="Nhập câu hỏi tại đây..."></textarea>
                    </div>
                    
                    <div class="mt-2 sm:mt-3 flex justify-end shrink-0"><button class="btn btn-primary w-full sm:w-auto text-sm sm:text-base py-2 sm:py-2.5" onclick="app.addQuestion()"><i data-lucide="plus-circle" class="w-4 h-4 sm:w-5 sm:h-5 mr-1.5 sm:mr-2"></i> Thêm vào danh sách</button></div>
                </div>
            </div>

            <div class="lg:col-span-4 bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col h-[500px] lg:h-[calc(100vh-14rem)] lg:sticky lg:top-20 mt-2 lg:mt-0">
                <div class="p-2 sm:p-4 border-b border-slate-200 bg-slate-50 rounded-t-xl flex justify-between items-center shrink-0">
                    <h3 class="font-bold text-slate-800 flex items-center gap-1.5 sm:gap-2 text-sm sm:text-base"><i data-lucide="list-checks" class="w-4 h-4 sm:w-5 sm:h-5 text-emerald-500"></i> Danh sách câu hỏi</h3>
                    <span id="qCountBadge" class="bg-emerald-100 text-emerald-700 text-[10px] sm:text-xs font-bold px-2 py-0.5 sm:px-2.5 sm:py-1 rounded-full shadow-[0_2px_0_0_#a7f3d0]">0 câu</span>
                </div>
                <div id="qList" class="p-2 sm:p-4 space-y-2 sm:space-y-3 overflow-y-auto flex-1 bg-slate-50/50"></div>
            </div>
        </section>
    </main>

    <div id="gfModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-2 sm:p-4 transition-all duration-300 opacity-0 pointer-events-none">
        <div class="modal-content bg-white rounded-xl sm:rounded-2xl shadow-2xl p-3 sm:p-6 transform transition-all duration-300 scale-95 translate-y-4 w-full max-w-4xl flex flex-col max-h-[95vh] sm:max-h-[90vh]">
            <div class="flex justify-between items-center mb-3 sm:mb-4 pb-2 sm:pb-3 border-b-2 border-slate-100 shrink-0">
                <h2 class="text-base sm:text-2xl font-bold text-slate-900 flex items-center gap-2"><i data-lucide="database" class="w-5 h-5 sm:w-7 sm:h-7 text-green-500"></i> Cấu hình Form</h2>
                <button onclick="app.closeModal('gfModal')" class="text-slate-400 hover:text-red-500 bg-slate-100 hover:bg-red-50 p-1.5 sm:p-2 rounded-xl active:scale-90"><i data-lucide="x" class="w-4 h-4 sm:w-5 sm:h-5"></i></button>
            </div>
            
            <div class="flex flex-col sm:flex-row gap-2 sm:gap-3 mb-3 sm:mb-4 shrink-0">
                <input type="text" id="gfUrlInput" class="form-input flex-1 text-xs sm:text-base py-2 sm:py-3" placeholder="Dán link Form vào đây...">
                <button id="btnAnalyze" class="btn btn-green whitespace-nowrap" onclick="app.autoAnalyzeGF()"><i data-lucide="zap" class="w-4 h-4 sm:w-5 sm:h-5 mr-1 sm:mr-2"></i>Phân tích</button>
            </div>

            <div class="flex-1 overflow-y-auto min-h-0 border-2 border-slate-200 rounded-xl mb-3 sm:mb-4 bg-slate-50 shadow-inner p-0 sm:p-2">
                <table class="w-full text-[10px] sm:text-sm text-left">
                    <thead class="bg-white sticky top-0 z-10 shadow-sm rounded-lg">
                        <tr>
                            <th class="p-2 sm:p-4 font-bold text-slate-700">Tiêu đề trường</th>
                            <th class="p-2 sm:p-4 font-bold text-slate-700 hidden sm:table-cell">Mã ID</th>
                            <th class="p-2 sm:p-4 font-bold text-slate-700">Loại dữ liệu</th>
                            <th class="p-2 sm:p-4 font-bold text-slate-700 text-center">Bắt buộc</th>
                        </tr>
                    </thead>
                    <tbody id="gfFieldsTable" class="divide-y divide-slate-100 bg-white"></tbody>
                </table>
            </div>
            <div class="flex justify-end pt-2 sm:pt-3 border-t-2 border-slate-100 shrink-0">
                <button class="btn btn-primary py-2 px-6 sm:px-8 w-full sm:w-auto" onclick="app.saveGFConfig()">Lưu thông tin</button>
            </div>
        </div>
    </div>

    <div id="editModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-2 sm:p-4 transition-all duration-300 opacity-0 pointer-events-none">
        <div class="modal-content bg-white rounded-xl sm:rounded-2xl shadow-2xl p-4 sm:p-6 w-full max-w-4xl transform transition-all duration-300 scale-95 translate-y-4 flex flex-col max-h-[95vh] sm:max-h-[90vh]">
            <h2 class="text-lg sm:text-xl font-bold mb-2 sm:mb-4 shrink-0">Chỉnh sửa câu hỏi</h2>
            <div class="flex-1 flex flex-col min-h-0 gap-2">
                <div id="editorToolbarEdit" class="w-full shrink-0"></div>
                <textarea id="qInputEdit" class="w-full p-3 sm:p-5 font-mono text-sm sm:text-base flex-1 min-h-[200px] bg-white border-2 border-slate-200 rounded-xl outline-none resize-none overflow-y-auto focus:border-blue-500 focus:ring-4 focus:ring-blue-500/20 transition-all"></textarea>
            </div>
            <div class="flex justify-end gap-2 sm:gap-3 mt-3 sm:mt-4 shrink-0">
                <button class="btn btn-outline flex-1 sm:flex-none" onclick="app.closeModal('editModal')">Hủy</button>
                <button class="btn btn-primary flex-1 sm:flex-none" onclick="app.saveEditQuestion()">Lưu thay đổi</button>
            </div>
        </div>
    </div>

    <input type="file" id="fileLoader" class="hidden">
    <input type="file" id="txtLoader" accept=".txt" class="hidden" onchange="app.importTXT(event)">
    <script>
        // Kích hoạt mobile drag & drop polyfill
        window.addEventListener('touchmove', function() {}, {passive: false});
        mobileDragDrop.polyfill({ dragImageTranslateOverride: mobileDragDrop.scrollBehaviourDragImageTranslateOverride });
    </script>
    <script src="script.js"></script>
</body>
</html>
