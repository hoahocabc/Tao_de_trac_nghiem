<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo đề trắc nghiệm - Hóa học ABC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@0.263.1/dist/umd/lucide.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-100 text-slate-800 min-h-screen flex flex-col" style="font-family:'Inter',sans-serif;">

<!-- HEADER -->
<header class="bg-white border-b border-slate-200 shadow-sm sticky top-0 z-40">
    <div class="max-w-screen-xl mx-auto px-4 h-16 flex items-center justify-between gap-2">
        <div class="flex items-center gap-3 shrink-0">
            <div class="bg-blue-500 p-2 rounded-xl text-white">
                <i data-lucide="flask-conical" class="w-5 h-5"></i>
            </div>
            <span class="font-bold text-slate-900 hidden md:block">Tạo đề trắc nghiệm - Hóa học ABC</span>
        </div>
        <div class="flex items-center gap-2 overflow-x-auto py-1">
            <button onclick="App.newProject()" class="hdr-btn">
                <i data-lucide="file-plus" class="w-4 h-4 mr-1"></i> Tạo mới
            </button>
            <button onclick="App.loadProject()" class="hdr-btn">
                <i data-lucide="folder-open" class="w-4 h-4 mr-1"></i> Mở file
            </button>
            <button onclick="App.saveProject()" class="hdr-btn">
                <i data-lucide="save" class="w-4 h-4 mr-1"></i> Lưu
            </button>
            <button onclick="App.openGF()" class="hdr-btn-green">
                <i data-lucide="database" class="w-4 h-4 mr-1"></i> Google Form
            </button>
            <button onclick="App.exportHTML()" class="hdr-btn-blue">
                <i data-lucide="rocket" class="w-4 h-4 mr-1"></i> Xuất HTML
            </button>
        </div>
    </div>
</header>

<main class="flex-1 max-w-screen-xl mx-auto w-full px-4 py-5 flex flex-col gap-5">

    <!-- CẤU HÌNH -->
    <section class="bg-white rounded-2xl border border-slate-200 shadow-sm p-5">
        <div class="text-xs font-bold text-slate-500 uppercase tracking-wide mb-4 flex items-center gap-2">
            <i data-lucide="settings-2" class="w-4 h-4 text-blue-500"></i> Cấu hình đề thi
        </div>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="flex flex-col gap-3">
                <div>
                    <label class="lbl">Tên bài kiểm tra</label>
                    <input id="quizTitle" class="inp" value="BÀI TẬP TRẮC NGHIỆM">
                </div>
                <div>
                    <label class="lbl">Người tạo</label>
                    <input id="creatorName" class="inp" placeholder="VD: Thầy Nguyễn Văn A">
                </div>
            </div>
            <div class="flex flex-col gap-3">
                <div>
                    <label class="lbl">Giờ bắt đầu <span class="font-normal text-slate-400">(HH:MM DD/MM/YYYY)</span></label>
                    <input id="startTime" class="inp" placeholder="Bỏ trống = thi ngay">
                </div>
                <div>
                    <label class="lbl">Giờ kết thúc <span class="font-normal text-slate-400">(bỏ trống = không giới hạn)</span></label>
                    <input id="endTime" class="inp" placeholder="Bỏ trống = không giới hạn">
                </div>
            </div>
            <div class="flex flex-col gap-3">
                <div>
                    <label class="lbl">Giao diện (Theme)</label>
                    <select id="themeSelect" class="inp"></select>
                </div>
                <div class="flex items-center gap-3 bg-slate-50 border-2 border-slate-200 rounded-xl px-4 py-2.5 cursor-pointer hover:border-blue-400 transition-all">
                    <input type="checkbox" id="shuffleCheck" class="w-5 h-5 accent-blue-600 cursor-pointer">
                    <label for="shuffleCheck" class="text-sm font-semibold text-slate-700 cursor-pointer select-none">🔀 Xáo trộn câu hỏi & đáp án</label>
                </div>
            </div>
        </div>
    </section>

    <!-- EDITOR + LIST -->
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-5 flex-1">

        <!-- EDITOR -->
        <div class="lg:col-span-7 bg-white rounded-2xl border border-slate-200 shadow-sm flex flex-col" style="height:calc(100vh - 14rem);min-height:480px;">

            <!-- TABS -->
            <div id="tabsContainer" class="grid grid-cols-6 gap-1.5 p-3 bg-slate-100 border-b border-slate-200 rounded-t-2xl"></div>

            <!-- BODY -->
            <div class="flex flex-col flex-1 p-4 gap-3 min-h-0">
                <div class="flex items-center justify-between shrink-0">
                    <h2 id="partTitle" class="font-extrabold text-blue-700 text-lg">Phần 1: Một Lựa Chọn</h2>
                    <button onclick="App.showGuide()" class="text-xs font-semibold text-blue-600 bg-blue-50 border border-blue-200 rounded-lg px-3 py-1.5 hover:bg-blue-100 transition-all flex items-center gap-1">
                        <i data-lucide="help-circle" class="w-3.5 h-3.5"></i> Hướng dẫn
                    </button>
                </div>

                <!-- TOOLBAR -->
                <div id="toolbar" class="shrink-0 bg-slate-50 border-2 border-slate-200 rounded-xl p-2 flex flex-wrap gap-1 items-center"></div>

                <!-- TEXTAREA -->
                <textarea id="qInput"
                    class="flex-1 w-full p-3 font-mono text-sm rounded-xl border-2 border-slate-200 outline-none resize-none bg-white focus:border-blue-400 focus:ring-2 focus:ring-blue-100 transition-all leading-relaxed min-h-0"
                    placeholder="Nhập câu hỏi tại đây...&#10;&#10;Mỗi câu bắt đầu bằng ##&#10;Đáp án đúng có dấu # ở đầu dòng&#10;&#10;Ví dụ:&#10;##&#10;Thủ đô của Việt Nam là?&#10;# A. Hà Nội&#10;B. Huế&#10;C. TP. Hồ Chí Minh"></textarea>

                <button onclick="App.addQuestion()" class="shrink-0 w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 rounded-xl transition-all flex items-center justify-center gap-2 shadow-[0_3px_0_0_#1d4ed8] active:shadow-none active:translate-y-1">
                    <i data-lucide="plus-circle" class="w-5 h-5"></i> Thêm vào danh sách
                </button>
            </div>
        </div>

        <!-- DANH SÁCH -->
        <div class="lg:col-span-5 bg-white rounded-2xl border border-slate-200 shadow-sm flex flex-col" style="height:calc(100vh - 14rem);min-height:480px;">
            <div class="flex items-center justify-between px-4 py-3 border-b border-slate-200 bg-slate-50 rounded-t-2xl shrink-0">
                <span class="font-bold text-slate-800 flex items-center gap-2">
                    <i data-lucide="list-checks" class="w-5 h-5 text-emerald-500"></i> Danh sách câu hỏi
                </span>
                <span id="qCountBadge" class="text-xs font-bold bg-emerald-100 text-emerald-700 px-3 py-1 rounded-full">0 câu</span>
            </div>
            <div id="qList" class="flex-1 overflow-y-auto p-4 space-y-3"></div>
        </div>

    </div>
</main>

<!-- MODAL GOOGLE FORM -->
<div id="gfModal" class="modal-overlay hidden">
    <div class="modal-box" style="max-width:860px;">
        <div class="modal-header">
            <span class="font-bold text-lg flex items-center gap-2"><i data-lucide="database" class="w-5 h-5 text-green-500"></i> Cấu hình Google Form</span>
            <button onclick="App.closeModal('gfModal')" class="modal-close-btn"><i data-lucide="x" class="w-5 h-5"></i></button>
        </div>
        <div class="bg-blue-50 border border-blue-200 text-blue-800 text-sm rounded-xl p-3 mb-4 flex gap-2">
            <i data-lucide="info" class="w-4 h-4 shrink-0 mt-0.5"></i>
            Dán link Google Form dạng dài (KHÔNG dùng link rút gọn forms.gle). App sẽ tự quét các trường.
        </div>
        <div class="flex gap-2 mb-4">
            <input id="gfUrlInput" class="inp flex-1" placeholder="https://docs.google.com/forms/d/.../viewform">
            <button id="btnAnalyze" onclick="App.autoAnalyzeGF()" class="hdr-btn-green whitespace-nowrap">
                <i data-lucide="zap" class="w-4 h-4 mr-1"></i> Phân tích
            </button>
        </div>
        <div class="border-2 border-slate-200 rounded-xl overflow-hidden mb-4" style="max-height:320px;overflow-y:auto;">
            <table class="w-full text-sm">
                <thead class="bg-slate-100 sticky top-0">
                    <tr>
                        <th class="text-left p-3 font-bold text-slate-600">Tiêu đề</th>
                        <th class="text-left p-3 font-bold text-slate-600 hidden sm:table-cell">Entry ID</th>
                        <th class="text-left p-3 font-bold text-slate-600">Loại</th>
                        <th class="text-center p-3 font-bold text-slate-600">Bắt buộc</th>
                    </tr>
                </thead>
                <tbody id="gfFieldsBody" class="divide-y divide-slate-100 bg-white"></tbody>
            </table>
        </div>
        <div class="flex justify-end gap-3">
            <button onclick="App.closeModal('gfModal')" class="hdr-btn">Hủy</button>
            <button onclick="App.saveGFConfig()" class="hdr-btn-blue">Lưu cấu hình</button>
        </div>
    </div>
</div>

<!-- MODAL HƯỚNG DẪN -->
<div id="guideModal" class="modal-overlay hidden">
    <div class="modal-box" style="max-width:620px;">
        <div class="modal-header">
            <span class="font-bold text-lg flex items-center gap-2"><i data-lucide="book-open" class="w-5 h-5 text-blue-500"></i> Hướng dẫn nhập liệu</span>
            <button onclick="App.closeModal('guideModal')" class="modal-close-btn"><i data-lucide="x" class="w-5 h-5"></i></button>
        </div>
        <pre id="guideText" class="bg-slate-50 border border-slate-200 rounded-xl p-4 text-sm text-slate-700 leading-relaxed whitespace-pre-wrap font-mono overflow-y-auto" style="max-height:400px;"></pre>
        <div class="flex justify-end mt-4">
            <button onclick="App.closeModal('guideModal')" class="hdr-btn-blue">Đã hiểu ✓</button>
        </div>
    </div>
</div>

<input type="file" id="fileLoader" class="hidden">
<script src="script.js"></script>
</body>
</html>
