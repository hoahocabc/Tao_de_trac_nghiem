<!DOCTYPE html>
<html lang="vi" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hóa học ABC - Tạo đề thi trắc nghiệm</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#E8F4FF] text-gray-800 font-sans min-h-screen flex flex-col">
    <!-- Top Toolbar -->
    <div class="bg-white shadow px-4 py-3 flex flex-wrap gap-2 items-center sticky top-0 z-40">
        <h1 class="text-xl font-bold text-blue-600 mr-4"><i data-lucide="flask-conical" class="inline w-5 h-5 mr-1"></i>Hóa học ABC</h1>
        <button class="btn btn-blue" onclick="app.newProject()"><i data-lucide="file-plus" class="w-4 h-4 mr-1"></i>Tạo đề mới</button>
        <button class="btn btn-blue" onclick="app.loadProject()"><i data-lucide="folder-open" class="w-4 h-4 mr-1"></i>Mở dự án</button>
        <button class="btn btn-blue" onclick="app.saveProject()"><i data-lucide="save" class="w-4 h-4 mr-1"></i>Lưu dự án</button>
        <button class="btn btn-green" onclick="app.openGFSettings()"><i data-lucide="settings" class="w-4 h-4 mr-1"></i>Cài đặt Google Form</button>
        <button class="btn btn-red font-bold" onclick="app.exportHTML()"><i data-lucide="rocket" class="w-4 h-4 mr-1"></i>Xuất file HTML</button>
    </div>

    <main class="flex-1 container mx-auto px-4 py-4 max-w-6xl">
        <!-- Test Info -->
        <div class="bg-white p-4 rounded shadow mb-4 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            <div><label class="block text-sm font-bold mb-1">Tên bài kiểm tra:</label><input type="text" id="quizTitle" class="input-full" value="BÀI TẬP TRẮC NGHIỆM"></div>
            <div><label class="block text-sm font-bold mb-1">Tên người tạo:</label><input type="text" id="creatorName" class="input-full"></div>
            <div>
                <label class="block text-sm font-bold mb-1">Giao diện (Theme):</label>
                <select id="themeSelect" class="input-full"></select>
            </div>
            <div><label class="block text-sm font-bold mb-1">Bắt đầu thi (HH:MM DD/MM/YYYY):</label><input type="text" id="startTime" class="input-full" placeholder="Bỏ trống thi ngay"></div>
            <div><label class="block text-sm font-bold mb-1">Hết hạn nộp (HH:MM DD/MM/YYYY):</label><input type="text" id="endTime" class="input-full" placeholder="Bỏ trống không giới hạn"></div>
        </div>

        <!-- Editor Section -->
        <div class="bg-white rounded shadow flex flex-col" style="min-height: 600px;">
            <!-- Tabs -->
            <div class="flex border-b overflow-x-auto" id="tabsContainer">
                <!-- Generated by JS -->
            </div>

            <!-- Tab Content -->
            <div class="p-4 flex-1 flex flex-col">
                <div class="flex justify-between items-center mb-2">
                    <h2 class="text-lg font-bold text-blue-700" id="partTitle">Phần 1</h2>
                    <button class="text-blue-500 hover:underline text-sm" onclick="app.showGuide()">Xem hướng dẫn nhập</button>
                </div>

                <!-- Rich Text Toolbar -->
                <div class="bg-blue-50 p-2 border border-b-0 rounded-t flex flex-wrap gap-2 items-center text-sm" id="editorToolbar">
                    <!-- Symbols injected by JS -->
                </div>

                <textarea id="qInput" class="w-full border p-3 font-mono text-sm flex-1 outline-none focus:border-blue-400" placeholder="Nhập câu hỏi... Mỗi câu cách nhau bởi ##. Đáp án đúng có dấu #..."></textarea>
                
                <div class="mt-3 text-right">
                    <button class="btn btn-blue" onclick="app.addQuestion()">Thêm câu hỏi</button>
                </div>

                <hr class="my-4">
                <h3 class="font-bold mb-2">Câu hỏi đã thêm:</h3>
                <div id="qList" class="space-y-2 overflow-y-auto max-h-64"></div>
            </div>
        </div>
    </main>

    <!-- Modals -->
    <!-- GF Modal -->
    <div id="gfModal" class="modal-overlay hidden">
        <div class="modal-content w-full max-w-4xl">
            <h2 class="text-xl font-bold text-blue-600 mb-2">Cài đặt gửi điểm về Google Form</h2>
            <p class="text-sm text-gray-600 mb-4">Dán link Form vào đây. Phần mềm sẽ tự động quét trạng thái bắt buộc của Form.</p>
            <div class="flex gap-2 mb-4">
                <input type="text" id="gfUrlInput" class="input-full flex-1" placeholder="https://docs.google.com/forms/d/e/.../viewform">
                <button class="btn btn-green" onclick="app.autoAnalyzeGF()">Tự động phân tích ⚡</button>
            </div>
            <div class="max-h-64 overflow-y-auto border rounded mb-4">
                <table class="w-full text-sm text-left">
                    <thead class="bg-gray-100"><tr><th class="p-2">Tiêu đề</th><th class="p-2">Mã Entry ID</th><th class="p-2">Chức năng</th><th class="p-2">Bắt buộc (*)</th></tr></thead>
                    <tbody id="gfFieldsTable"></tbody>
                </table>
            </div>
            <div class="text-right">
                <button class="btn bg-gray-300 hover:bg-gray-400 mr-2" onclick="app.closeModal('gfModal')">Hủy</button>
                <button class="btn btn-blue" onclick="app.saveGFConfig()">Lưu cấu hình</button>
            </div>
        </div>
    </div>

    <!-- Edit/Insert Modals can be added similarly -->
    <input type="file" id="fileLoader" class="hidden">
    
    <script src="script.js"></script>
</body>
</html>
