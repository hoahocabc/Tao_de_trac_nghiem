<!DOCTYPE html>
<html lang="vi" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hóa học ABC - Tạo đề thi trắc nghiệm</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { primary: '#2563eb' }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col">
    <!-- Top Navbar -->
    <header class="bg-white border-b border-slate-200 shadow-sm sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 lg:px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="bg-blue-600 p-2 rounded-lg text-white">
                    <i data-lucide="flask-conical" class="w-5 h-5"></i>
                </div>
                <h1 class="text-xl font-bold text-slate-900 tracking-tight">Hóa học ABC</h1>
            </div>
            <div class="flex items-center gap-2 overflow-x-auto no-scrollbar">
                <button class="btn btn-outline" onclick="app.newProject()"><i data-lucide="file-plus" class="w-4 h-4 mr-1.5"></i>Tạo mới</button>
                <button class="btn btn-outline" onclick="app.loadProject()"><i data-lucide="folder-open" class="w-4 h-4 mr-1.5"></i>Mở</button>
                <button class="btn btn-outline" onclick="app.saveProject()"><i data-lucide="save" class="w-4 h-4 mr-1.5"></i>Lưu</button>
                <div class="w-px h-6 bg-slate-200 mx-1"></div>
                <button class="btn btn-green" onclick="app.openGFSettings()"><i data-lucide="settings" class="w-4 h-4 mr-1.5"></i>Google Form</button>
                <button class="btn btn-primary" onclick="app.exportHTML()"><i data-lucide="rocket" class="w-4 h-4 mr-1.5"></i>Xuất HTML</button>
            </div>
        </div>
    </header>

    <main class="flex-1 max-w-7xl mx-auto w-full px-4 lg:px-6 py-6 flex flex-col gap-6">
        <!-- Test Info Settings -->
        <section class="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
            <h2 class="text-sm font-semibold text-slate-500 uppercase tracking-wider mb-4 flex items-center gap-2">
                <i data-lucide="info" class="w-4 h-4"></i> Cấu hình đề thi
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4">
                <div class="lg:col-span-2">
                    <label class="form-label">Tên bài kiểm tra</label>
                    <input type="text" id="quizTitle" class="form-input" value="BÀI TẬP TRẮC NGHIỆM">
                </div>
                <div>
                    <label class="form-label">Người tạo</label>
                    <input type="text" id="creatorName" class="form-input" placeholder="VD: Thầy A">
                </div>
                <div>
                    <label class="form-label">Giao diện (Theme)</label>
                    <select id="themeSelect" class="form-select"></select>
                </div>
                <div>
                    <label class="form-label">Hạn nộp bài</label>
                    <input type="text" id="endTime" class="form-input" placeholder="HH:MM DD/MM/YYYY">
                    <input type="hidden" id="startTime" value=""> <!-- Ẩn start time nếu ít dùng -->
                </div>
            </div>
        </section>

        <!-- Main Workspace: Editor & List -->
        <section class="grid grid-cols-1 lg:grid-cols-12 gap-6 flex-1 items-start">
            
            <!-- Editor Column -->
            <div class="lg:col-span-7 bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col overflow-hidden sticky top-24" style="height: calc(100vh - 12rem);">
                <!-- Tabs -->
                <div class="flex overflow-x-auto bg-slate-50/50 border-b border-slate-200 p-2 gap-1" id="tabsContainer">
                    <!-- Generated by JS -->
                </div>

                <div class="p-4 flex-1 flex flex-col">
                    <div class="flex justify-between items-center mb-3">
                        <h2 class="text-lg font-bold text-slate-800 flex items-center gap-2" id="partTitle">Phần 1</h2>
                        <button class="text-blue-600 hover:text-blue-700 bg-blue-50 hover:bg-blue-100 px-3 py-1.5 rounded-md text-sm font-medium transition-colors flex items-center gap-1.5" onclick="app.showGuide()">
                            <i data-lucide="help-circle" class="w-4 h-4"></i> Hướng dẫn nhập
                        </button>
                    </div>

                    <!-- Editor Box -->
                    <div class="flex-1 flex flex-col border border-slate-200 rounded-lg overflow-hidden focus-within:border-blue-500 focus-within:ring-1 focus-within:ring-blue-500 transition-all shadow-inner bg-slate-50/30">
                        <div class="bg-white p-2 border-b border-slate-200 flex flex-wrap gap-1.5 items-center text-sm" id="editorToolbar">
                            <!-- Symbols injected by JS -->
                        </div>
                        <textarea id="qInput" class="w-full p-4 font-mono text-sm flex-1 outline-none resize-none bg-transparent" placeholder="Nhập câu hỏi tại đây... Mỗi câu cách nhau bởi ##. Đáp án đúng có dấu # ở đầu..."></textarea>
                    </div>
                    
                    <div class="mt-4 flex justify-end">
                        <button class="btn btn-primary w-full sm:w-auto text-base py-2.5" onclick="app.addQuestion()">
                            <i data-lucide="plus" class="w-5 h-5 mr-1"></i> Thêm vào danh sách
                        </button>
                    </div>
                </div>
            </div>

            <!-- Question List Column -->
            <div class="lg:col-span-5 bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col" style="height: calc(100vh - 12rem);">
                <div class="p-4 border-b border-slate-200 bg-slate-50/50 rounded-t-xl flex justify-between items-center">
                    <h3 class="font-bold text-slate-800 flex items-center gap-2">
                        <i data-lucide="list-checks" class="w-5 h-5 text-blue-600"></i> Danh sách câu hỏi
                    </h3>
                    <span id="qCountBadge" class="bg-blue-100 text-blue-700 text-xs font-bold px-2.5 py-1 rounded-full">0 câu</span>
                </div>
                <div id="qList" class="p-4 space-y-3 overflow-y-auto flex-1 bg-slate-50/30">
                    <!-- Injected by JS -->
                </div>
            </div>
        </section>
    </main>

    <!-- Modal GF Settings -->
    <div id="gfModal" class="modal-overlay hidden">
        <div class="modal-content w-full max-w-4xl flex flex-col max-h-[90vh]">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-slate-900 flex items-center gap-2"><i data-lucide="database" class="w-5 h-5 text-green-600"></i> Cấu hình Google Form</h2>
                <button onclick="app.closeModal('gfModal')" class="text-slate-400 hover:text-slate-600"><i data-lucide="x" class="w-6 h-6"></i></button>
            </div>
            <p class="text-sm text-slate-600 mb-4">Dán link Google Form vào đây để phần mềm tự động lấy danh sách các trường nhập liệu.</p>
            <div class="flex flex-col sm:flex-row gap-3 mb-4">
                <input type="text" id="gfUrlInput" class="form-input flex-1" placeholder="https://docs.google.com/forms/d/e/.../viewform">
                <button class="btn btn-green whitespace-nowrap" onclick="app.autoAnalyzeGF()"><i data-lucide="zap" class="w-4 h-4 mr-1.5"></i>Phân tích tự động</button>
            </div>
            <div class="flex-1 overflow-y-auto border border-slate-200 rounded-lg mb-4 bg-white">
                <table class="w-full text-sm text-left">
                    <thead class="bg-slate-50 sticky top-0 border-b border-slate-200">
                        <tr>
                            <th class="p-3 font-semibold text-slate-600">Tiêu đề trường</th>
                            <th class="p-3 font-semibold text-slate-600">Entry ID</th>
                            <th class="p-3 font-semibold text-slate-600">Loại dữ liệu</th>
                            <th class="p-3 font-semibold text-slate-600 text-center">Bắt buộc (*)</th>
                        </tr>
                    </thead>
                    <tbody id="gfFieldsTable" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>
            <div class="flex justify-end gap-2 pt-4 border-t border-slate-100">
                <button class="btn btn-outline" onclick="app.closeModal('gfModal')">Hủy</button>
                <button class="btn btn-primary" onclick="app.saveGFConfig()">Lưu cấu hình</button>
            </div>
        </div>
    </div>

    <input type="file" id="fileLoader" class="hidden">
    <script src="script.js"></script>
</body>
</html>
